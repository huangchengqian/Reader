<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="LocalReader — A fully offline Android ebook reader">
  <title>LocalReader — A fully offline Android ebook reader</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>

    <linearGradient id="book1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="book2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="book3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Decorative grid dots -->
  <g fill="#FFFFFF" opacity="0.08">
    <circle cx="80"   cy="80"  r="2"/>
    <circle cx="160"  cy="80"  r="2"/>
    <circle cx="240"  cy="80"  r="2"/>
    <circle cx="1120" cy="560" r="2"/>
    <circle cx="1200" cy="560" r="2"/>
    <circle cx="80"   cy="560" r="2"/>
    <circle cx="1200" cy="80"  r="2"/>
  </g>

  <!-- Decorative diagonal lines -->
  <g stroke="#A78BFA" stroke-width="2" opacity="0.18" fill="none">
    <line x1="0"    y1="0" x2="320"  y2="640"/>
    <line x1="1280" y1="0" x2="960"  y2="640"/>
  </g>

  <!-- Logo mark (book stack) -->
  <g transform="translate(100,150)">
    <!-- shadow -->
    <ellipse cx="120" cy="320" rx="120" ry="14" fill="#000" opacity="0.35"/>

    <!-- bottom book (green) -->
    <g transform="translate(0,170)">
      <rect x="10"  y="0"  width="220" height="50" rx="6" fill="url(#book3)"/>
      <rect x="10"  y="0"  width="10"  height="50" fill="#065F46"/>
      <rect x="35"  y="14" width="170" height="3"  fill="#065F46" opacity="0.5"/>
      <rect x="35"  y="22" width="120" height="3"  fill="#065F46" opacity="0.35"/>
      <rect x="35"  y="30" width="150" height="3"  fill="#065F46" opacity="0.35"/>
    </g>

    <!-- middle book (orange) -->
    <g transform="translate(20,110)">
      <rect x="10"  y="0"  width="220" height="60" rx="6" fill="url(#book2)"/>
      <rect x="10"  y="0"  width="10"  height="60" fill="#92400E"/>
      <circle cx="195" cy="30" r="14" fill="#92400E" opacity="0.85"/>
      <path d="M188 30 l5 5 l10 -10" stroke="#FDE68A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- top book (white) — open -->
    <g transform="translate(40,30)">
      <!-- left page -->
      <path d="M0 10 L90 0 L90 80 L0 90 Z" fill="url(#book1)" stroke="#94A3B8" stroke-width="1.5"/>
      <!-- right page -->
      <path d="M180 10 L90 0 L90 80 L180 90 Z" fill="url(#book1)" stroke="#94A3B8" stroke-width="1.5"/>
      <!-- spine -->
      <line x1="90" y1="0" x2="90" y2="80" stroke="#475569" stroke-width="2"/>
      <!-- text lines -->
      <line x1="10" y1="25" x2="80" y2="20" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
      <line x1="10" y1="35" x2="80" y2="30" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
      <line x1="10" y1="45" x2="70" y2="40" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="20" x2="170" y2="25" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="30" x2="170" y2="35" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="40" x2="160" y2="45" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>

  <!-- Title -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="430" y="200" font-size="100" font-weight="800" fill="#F8FAFC" letter-spacing="-3">LocalReader</text>

    <!-- Underline accent -->
    <rect x="430" y="220" width="120" height="6" rx="3" fill="url(#accent)"/>

    <!-- Tagline -->
    <text x="430" y="280" font-size="32" font-weight="500" fill="#E2E8F0">A fully offline Android ebook reader</text>
    <text x="430" y="320" font-size="22" font-weight="400" fill="#94A3B8">Privacy-first · No ads · No tracking</text>

    <!-- Feature pills -->
    <g transform="translate(430,360)" font-size="20" font-weight="600">
      <g>
        <rect x="0" y="0" width="118" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="59" y="26" fill="#E0E7FF" text-anchor="middle">📚 EPUB</text>
      </g>
      <g transform="translate(132,0)">
        <rect x="0" y="0" width="118" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="59" y="26" fill="#E0E7FF" text-anchor="middle">📖 MOBI</text>
      </g>
      <g transform="translate(264,0)">
        <rect x="0" y="0" width="148" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="74" y="26" fill="#E0E7FF" text-anchor="middle">🚀 Jetpack Compose</text>
      </g>
      <g transform="translate(0,52)">
        <rect x="0" y="0" width="158" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="79" y="26" fill="#E0E7FF" text-anchor="middle">🎨 Material 3</text>
      </g>
      <g transform="translate(172,52)">
        <rect x="0" y="0" width="148" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="74" y="26" fill="#E0E7FF" text-anchor="middle">🔒 100% Offline</text>
      </g>
      <g transform="translate(334,52)">
        <rect x="0" y="0" width="158" height="40" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="1.5"/>
        <text x="79" y="26" fill="#E0E7FF" text-anchor="middle">⚡ Apache 2.0</text>
      </g>
    </g>

    <!-- Footer line -->
    <text x="430" y="540" font-size="20" font-weight="500" fill="#94A3B8">Built with Kotlin · Material 3 · Room · DataStore</text>
    <text x="430" y="570" font-size="18" font-weight="400" fill="#64748B">github.com/huangchengqian/Reader</text>
  </g>

  <!-- Top-right version badge -->
  <g transform="translate(1100,80)" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
    <rect x="0" y="0" width="140" height="48" rx="24" fill="#0F172A" stroke="url(#accent)" stroke-width="2"/>
    <text x="70" y="30" font-size="22" font-weight="700" fill="#F8FAFC" text-anchor="middle">v2.1.0</text>
  </g>
</svg>